<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(140deg, #0f172a, #1e293b 45%, #e2e8f0);
        }
        .login-shell {
            min-height: 100vh;
        }
        .login-card {
            border: 0;
            border-radius: 1.25rem;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.25);
        }
        .brand-mark {
            width: 52px;
            height: 52px;
            border-radius: 1rem;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <main class="container login-shell d-flex align-items-center justify-content-center py-5">
        <section class="col-12 col-md-8 col-lg-5">
            <div class="card login-card">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="brand-mark">S</div>
                        <div>
                            <h1 class="h4 mb-1">Connexion</h1>
                            <p class="text-secondary mb-0">Acces securise au tableau de bord de scan.</p>
                        </div>
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger">Identifiants invalides. Verifiez le nom d'utilisateur et le mot de passe.</div>
                    {% endif %}

                    <form method="post" class="vstack gap-3">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next|default:'/' }}">

                        <div>
                            <label for="id_username" class="form-label">Nom d'utilisateur</label>
                            <input type="text" name="username" autofocus required class="form-control" id="id_username">
                        </div>

                        <div>
                            <label for="id_password" class="form-label">Mot de passe</label>
                            <input type="password" name="password" required class="form-control" id="id_password">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
