<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Refusé - 403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #0ea5e9;
            --ink: #0f172a;
            --muted: #64748b;
            --paper: #f8fafc;
        }

        body {
            background:
                radial-gradient(circle at 10% 10%, rgba(14, 165, 233, 0.15), transparent 30%),
                radial-gradient(circle at 90% 20%, rgba(16, 185, 129, 0.15), transparent 35%),
                linear-gradient(140deg, #e2e8f0, #f8fafc);
            min-height: 100vh;
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-container {
            text-align: center;
            max-width: 500px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .error-message {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem 0;
            color: var(--ink);
        }

        .error-description {
            color: var(--muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 12px 35px rgba(15, 23, 42, 0.08);
            border-left: 4px solid #ef4444;
        }

        .btn-group-vertical {
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="card p-4 p-md-5">
            <h1 class="error-code">403</h1>
            <h2 class="error-message">Accès Refusé</h2>
            <p class="error-description">
                Vous n'avez pas les permissions nécessaires pour accéder au panneau d'administration.<br>
                Seuls les administrateurs (rôle <strong>Admin</strong>) peuvent accéder à cette section.
            </p>

            <div class="d-flex flex-column gap-2 pt-3">
                <a href="/" class="btn btn-primary">Retour au Dashboard</a>
                <a href="/logout/" class="btn btn-outline-secondary">Se déconnecter</a>
            </div>
        </div>
    </div>
</body>
</html>
